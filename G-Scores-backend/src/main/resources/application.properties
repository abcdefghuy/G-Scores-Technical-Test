spring.application.name=G-Scores
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${APP_PROFILE:${SPRING_PROFILES_ACTIVE:dev}}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Seeder ────────────────────────────────────────────────────────────────────
app.seeder.csv-path=classpath:data/diem_thi_thpt_2024.csv
app.seeder.batch-size=1000

# ── JDBC Batch (enables true PostgreSQL batch inserts for the seeder) ──────────
spring.jpa.properties.hibernate.jdbc.batch_size=1000
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ── CORS ──────────────────────────────────────────────────────────────────────
# Environment-specific values are defined in application-{profile}.properties
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
