name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "G-Scores-frontend/**"
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "8"

jobs:
  # Code Quality Checks
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run audit check
        run: pnpm audit --audit-level moderate
        continue-on-error: true

  # Build and Test
  build:
    name: Build Application
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: G-Scores-frontend
    needs: quality

    strategy:
      matrix:
        environment: [production]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: "G-Scores-frontend/pnpm-lock.yaml"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build application
        run: |
          if [ "${{ matrix.environment }}" == "production" ]; then
            NODE_ENV=production pnpm run build
          else
            NODE_ENV=${{ matrix.environment }} pnpm run build
          fi

      - name: Bundle analysis
        if: matrix.environment == 'production'
        run: ANALYZE=true pnpm run build

      - name: Upload build artifacts
        if: matrix.environment == 'production'
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: |
            .next/
            public/
          retention-days: 7

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: G-Scores-frontend
    needs: quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run security scan
        run: |
          # Check for known vulnerabilities
          pnpm audit --audit-level high

          # Check for secrets in code (basic check)
          if grep -r "sk_" src/ || grep -r "pk_" src/ || grep -r "secret" src/; then
            echo "Potential secrets found in source code"
            exit 1
          fi
        continue-on-error: true

  # Performance Testing
  performance:
    name: Performance Testing
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: G-Scores-frontend
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build for performance testing
        run: NODE_ENV=production pnpm run build

      - name: Start application
        run: |
          pnpm start &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV

          # Wait for app to be ready
          timeout 60 bash -c 'until curl -f http://localhost:3000; do sleep 2; done'

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.12.x
          lhci autorun --config=./lighthouserc.js
        continue-on-error: true

      - name: Stop application
        if: always()
        run: kill $APP_PID || true

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: G-Scores-frontend
    needs: [quality, build, security, performance]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"
          scope: ${{ secrets.VERCEL_ORG_ID }}

      - name: Post-deployment verification
        run: |
          # Wait for deployment
          sleep 60

          # Health check
          curl -f ${{ secrets.PRODUCTION_URL }}/api/health || exit 1

          # Critical path check
          curl -f ${{ secrets.PRODUCTION_URL }} || exit 1

      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful!"
          # Add Slack/Discord notification here if needed

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "Production deployment failed!"
          # Add failure notification here

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: G-Scores-frontend
    needs: [deploy-production]
    if: always()

    steps:
      - name: Clean up old artifacts
        run: |
          echo "Cleaning up build artifacts and temporary files..."
          # Cleanup logic here
